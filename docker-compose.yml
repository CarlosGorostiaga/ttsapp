services:
  web:
    image: node:20-bookworm
    working_dir: /app
    volumes:
      - .:/app                          # repo → /app
      - node_modules:/app/node_modules  # volumen Docker (no ocupa tu disco)
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=1
    command: bash -lc "npm install && npx ng serve --host 0.0.0.0 --port 4200 --poll 500"
volumes:
  node_modules:
